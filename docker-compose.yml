services:
  db:
    image: postgres:15
    container_name: walleto_postgres
    restart: always
    environment:
      POSTGRES_USER: walleto_user
      POSTGRES_PASSWORD: walleto_pass
      POSTGRES_DB: walleto_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walleto_user -d walleto_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: walleto_api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  postgres_data: